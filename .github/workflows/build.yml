name: 构建工程助手

on:
  push:
    branches:
      - main
      - v10-build
      - 'v10.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow pymupdf python-docx ezdxf matplotlib olefile

      - name: Read version
        id: version
        shell: bash
        run: |
          # 从 VERSION.py 提取版本号（import 方式，避免 exec 执行 main 代码）
          MAJOR=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[0])")
          MINOR=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[1])")
          PATCH=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[2])")
          echo "VERSION_STR=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
          echo "VERSION_DISPLAY=v$MAJOR" >> $GITHUB_OUTPUT
          echo "VERSION_APP=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
          echo "version=$MAJOR.$MINOR.$PATCH ($MAJOR.$MINOR)"

      - name: Prepare database
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── 策略 ──
          # 1) 工作区已有 DB
          # 2) 尝试从当前仓库的 standards_new.db.gz（CI 检出了 v10-build，此文件已在 git 中）
          # 3) 从 main 分支下载旧版

          if [ -f standards_new.db ]; then
            echo "✅ Found standards_new.db in workspace"
            ls -lh standards_new.db
            exit 0
          fi

          # standards_new.db.gz 已经提交到 v10-build 分支了（39MB）
          if [ -f standards_new.db.gz ]; then
            echo "✅ Found standards_new.db.gz in workspace — decompressing..."
            gunzip -f standards_new.db.gz
            ls -lh standards_new.db
            exit 0
          fi

          if [ -f standards.db ]; then
            echo "✅ Found standards.db — copying to standards_new.db"
            cp standards.db standards_new.db
            ls -lh standards_new.db
            exit 0
          fi

          echo "No DB in workspace — downloading from main branch..."

          # 尝试 standards_new.db.gz（最新压缩版）
          if gh api repos/${{ github.repository }}/contents/standards_new.db.gz?ref=main \
               -H "Accept: application/vnd.github.v3.raw" \
               > standards_new.db.gz 2>/dev/null && [ -s standards_new.db.gz ]; then
            echo "✅ Downloaded standards_new.db.gz from main — decompressing..."
            gunzip -f standards_new.db.gz
            ls -lh standards_new.db
            exit 0
          fi

          # 回退: 旧版 standards.db.gz
          if gh api repos/${{ github.repository }}/contents/standards.db.gz?ref=main \
               -H "Accept: application/vnd.github.v3.raw" \
               > standards.db.gz 2>/dev/null && [ -s standards.db.gz ]; then
            echo "⚠️ Downloaded OLD standards.db.gz from main — decompressing..."
            gunzip -f standards.db.gz
            cp standards.db standards_new.db
            ls -lh standards_new.db
            echo "WARNING: Using old database."
            exit 0
          fi

          echo "❌ Cannot find any database file — build will fail"
          exit 1

      - name: Setup OCR engine
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 下载 OCR 引擎（从专用的 ocr-engine-v1 Release，如果不存在则跳过）
          if [ -d ocr ]; then
            echo "✅ ocr/ already exists in workspace"
            ls -lh ocr/PaddleOCR-json.exe
            exit 0
          fi

          echo "Downloading OCR engine from ocr-engine-v1 release..."
          gh release download ocr-engine-v1 \
            --repo ${{ github.repository }} \
            --pattern "ocr-engine.tar.gz" \
            --dir ./ || echo "⚠️ ocr-engine-v1 release not found (may have been cleaned up)"

          if [ -f ocr-engine.tar.gz ]; then
            echo "✅ Downloaded OCR engine ($(ls -lh ocr-engine.tar.gz | awk '{print $5}'))"
            tar xzf ocr-engine.tar.gz
            rm -f ocr-engine.tar.gz
            echo "✅ Extracted ocr/ directory"
            ls -lh ocr/PaddleOCR-json.exe
          else
              echo "⚠️ OCR engine not available — build will continue WITHOUT OCR"

            # 创建空的 ocr 目录防止后续步骤因为缺少目录而报错
            mkdir -p ocr
            # 创建一个占位文件
            echo "OCR engine not available" > ocr/README.txt
          fi

      - name: Setup ODA engine (DWG → PDF, optional)
        shell: bash
        run: |
          echo "ODA engine setup skipped in CI — DWG preview uses DXF rendering + AutoCAD COM fallback at runtime"
          mkdir -p oda_converter
          echo "ODA engine not bundled in CI" > oda_converter/README.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller standard_checker.spec --noconfirm
        timeout-minutes: 30

      - name: Check build output
        shell: bash
        run: |
          echo "=== Build output ==="
          if [ -f dist/工程助手.exe ]; then
            echo "✅ EXE built successfully"
            ls -lh dist/工程助手.exe
          else
            echo "⚠️ EXE not found at expected path"
          fi
          if [ -d dist/工程助手_v10 ]; then
            echo "✅ Folder output found"
            ls -lh dist/工程助手_v10/
          else
            echo "⚠️ Folder output not found"
          fi

      - name: Smoke test EXE startup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist\工程助手_v10"
          $exe = Join-Path $outDir "工程助手.exe"
          $db = Join-Path $outDir "_internal\data\standards_new.db"
          $ocr = Join-Path $outDir "_internal\ocr\PaddleOCR-json.exe"

          Write-Host "=== Smoke test files ==="
          if (!(Test-Path $exe)) { throw "EXE not found: $exe" }
          if (!(Test-Path $db)) { throw "Database not found: $db" }
          if (!(Test-Path $ocr)) { Write-Host "⚠️ OCR engine not found: $ocr (OCR features disabled)" }
          Get-Item $exe, $db | Format-Table FullName, Length

          Write-Host "=== Starting EXE for smoke test ==="
          $p = Start-Process -FilePath $exe -WorkingDirectory $outDir -PassThru -WindowStyle Minimized
          Start-Sleep -Seconds 12

          if ($p.HasExited) {
            throw "EXE exited during smoke test. ExitCode=$($p.ExitCode). This usually means startup crashed."
          }

          Write-Host "✅ EXE stayed alive for 12 seconds; startup smoke test passed."
          Stop-Process -Id $p.Id -Force

      - name: Package artifacts
        shell: bash
        run: |
          set -e
          ROOT="${{ github.workspace }}"
          cd "$ROOT"
          
          echo "=== Checking build output structure ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          
          # 确定输出文件夹：优先 dist/工程助手_v10/，否则从 dist/ 整理
          OUTDIR="dist/工程助手_v10"
          if [ -d "$OUTDIR" ]; then
            echo "✅ Found $OUTDIR"
          else
            echo "⚠️ $OUTDIR not found — creating from dist/"
            mkdir -p "$OUTDIR"
            if [ -f dist/工程助手.exe ]; then
              mv dist/工程助手.exe "$OUTDIR/"
              echo "✅ Moved 工程助手.exe to $OUTDIR/"
            fi
            # 如果有 _internal/ 也移进去
            if [ -d dist/_internal ]; then
              mv dist/_internal "$OUTDIR/"
              echo "✅ Moved _internal/ to $OUTDIR/"
            fi
            # 如果有其他数据文件
            for f in dist/*; do
              name=$(basename "$f")
              if [ "$name" != "工程助手_v10" ]; then
                mv "$f" "$OUTDIR/" 2>/dev/null || true
              fi
            done
          fi
          
          echo "=== Contents of $OUTDIR ==="
          ls -lh "$OUTDIR/" 2>/dev/null || echo "(empty)"
          
          # ── 创建便携版 ZIP（仅单 EXE）──
          # 注意：使用英文文件名避免 gh CLI 在 Windows 上截断中文
          echo "--- Creating portable ZIP ---"
          PORTABLE_ZIP="$ROOT/ldassistant-portable.zip"
          if [ -f "$OUTDIR/工程助手.exe" ]; then
            if command -v 7z &>/dev/null; then
              (cd "$OUTDIR" && 7z a -mx=9 "$PORTABLE_ZIP" "工程助手.exe" >/dev/null)
            else
              (cd "$OUTDIR" && zip -9 "$PORTABLE_ZIP" "工程助手.exe")
            fi
            echo "✅ Portable ZIP created: $(ls -lh "$PORTABLE_ZIP" | awk '{print $5}')"
          else
            echo "⚠️ 工程助手.exe not found, skipping portable ZIP"
          fi
          
          # ── 创建完整版 ZIP（整个目录）──
          echo "--- Creating full ZIP ---"
          FULL_ZIP="$ROOT/ldassistant-full.zip"
          if [ -d "$OUTDIR" ] && [ "$(ls -A "$OUTDIR")" ]; then
            if command -v 7z &>/dev/null; then
              7z a -mx=9 "$FULL_ZIP" "$ROOT/$OUTDIR/" >/dev/null
            else
              (cd "$ROOT" && zip -9 -r "$FULL_ZIP" "dist/工程助手_v10/")
            fi
            echo "✅ Full ZIP created: $(ls -lh "$FULL_ZIP" | awk '{print $5}')"
          else
            echo "⚠️ Output directory is empty, creating ZIP from dist/ fallback"
            if command -v 7z &>/dev/null; then
              7z a -mx=9 "$FULL_ZIP" "$ROOT/dist/" >/dev/null
            else
              (cd "$ROOT" && zip -9 -r "$FULL_ZIP" "dist/")
            fi
          fi

      - name: Upload full folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 工程助手_v10_完整版
          path: |
            dist/工程助手_v10/
          if-no-files-found: warn

      - name: Delete stale releases (older than 1 day, no assets)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 删除无附件的自动构建 Release，避免 tag 冲突
          for tag in $(gh release list --repo ${{ github.repository }} --json tagName,isDraft --jq '.[] | select(.isDraft==false) | .tagName' 2>/dev/null); do
            assets=$(gh release view "$tag" --repo ${{ github.repository }} --json assets --jq '.assets | length' 2>/dev/null)
            if [ "$assets" = "0" ]; then
              echo "Deleting stale release: $tag (no assets)"
              gh release delete "$tag" --repo ${{ github.repository }} --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            fi
          done

      - name: Create Release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 从 VERSION.py 读取版本号（import 方式）
          MAJOR=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[0])")
          MINOR=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[1])")
          PATCH=$(python -c "import sys; sys.path.insert(0, '.'); import VERSION; print(VERSION.VERSION[2])")
          VERSION_DISPLAY="v${MAJOR}"
          VERSION_APP="${MAJOR}.${MINOR}"
          NOW=$(date +'%Y%m%d-%H%M%S')
          TAG="${VERSION_DISPLAY}-build-${NOW}"
          echo "Creating release tag: $TAG"

          # 先创建 Release（不含附件）
          gh release create "$TAG" \
            --title "工程助手 ${VERSION_DISPLAY} 构建版 ($(date +'%Y-%m-%d %H:%M'))" \
            --notes "版本 ${VERSION_APP}.${PATCH} — 自动构建发布" \
            --target "${{ github.sha }}" || {
            echo "❌ Release creation failed"
            exit 0
          }
          echo "✅ Release $TAG created (v${MAJOR}.${MINOR}.${PATCH})"

          # 睡眠 2 秒确保 Release 就绪
          sleep 2

          # 再逐个上传附件
          ASSETS=()
          PORTABLE_ZIP="${{ github.workspace }}/ldassistant-portable.zip"
          FULL_ZIP="${{ github.workspace }}/ldassistant-full.zip"
          
          for f in "$PORTABLE_ZIP" "$FULL_ZIP"; do
            if [ -f "$f" ]; then
              echo "Uploading: $f ($(ls -lh "$f" | awk '{print $5}'))"
              gh release upload "$TAG" "$f" --repo ${{ github.repository }} || echo "⚠️ Failed to upload $f"
            fi
          done
          echo "✅ Release $TAG complete"