name: Build LDAssistant EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
        architecture: x64
    - name: Install deps
      run: pip install pyinstaller PyQt5 Pillow rapidocr-onnxruntime
    - name: Decompress DB
      shell: bash
      run: gunzip -f standards.db.gz
    - name: Scrape 1
      run: python scraper.py 1 5500
      timeout-minutes: 60
    - name: Scrape 2
      run: python scraper.py 5501 11000
      timeout-minutes: 60
    - name: Scrape 3
      run: python scraper.py 11001 15052
      timeout-minutes: 60
    - name: Encrypt DB
      run: python encrypt_db.py
    - name: Build
      run: pyinstaller standard_checker.spec --noconfirm
    - name: Package
      run: Compress-Archive -Path dist/standard_checker/* -DestinationPath LDAssistant.zip
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: LDAssistant
        path: LDAssistant.zip