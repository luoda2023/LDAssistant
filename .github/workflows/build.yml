name: Build LDAssistant EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: 'x64'
    - name: Install deps
      run: pip install pyinstaller PyQt5 Pillow rapidocr-onnxruntime cryptography
    - name: Scrape full 376k standards
      run: python scraper.py
      timeout-minutes: 60
    - name: Compress and encrypt DB
      run: |
        python -c "import gzip; gzip.decompress(open('standards.db.gz','rb').read(), open('standards.db','wb'))"
        python encrypt_db.py
    - name: Build EXE
      run: pyinstaller standard_checker.spec --noconfirm
    - name: Package
      run: Compress-Archive -Path dist\standard_checker\* -DestinationPath LDAssistant.zip
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: LDAssistant
        path: LDAssistant.zip