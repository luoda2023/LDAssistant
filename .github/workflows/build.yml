name: Build LDAssistant EXE\non: [push, workflow_dispatch]\njobs:\n  build:\n    runs-on: windows-latest\n    steps:\n    - uses: actions/checkout@v4\n    - name: Setup Python 3.12\n      uses: actions/setup-python@v5\n      with: {python-version: 3.12, architecture: x64}\n    - name: Install deps\n      run: pip install pyinstaller PyQt5 Pillow rapidocr-onnxruntime\n    - name: Decompress DB\n      shell: bash\n      run: gunzip -f standards.db.gz\n    - name: Scrape 1\n      run: python scraper.py 1 5500\n      timeout-minutes: 60\n    - name: Scrape 2\n      run: python scraper.py 5501 11000\n      timeout-minutes: 60\n    - name: Scrape 3\n      run: python scraper.py 11001 15052\n      timeout-minutes: 60\n    - name: Encrypt DB\n      run: python encrypt_db.py\n    - name: Build\n      run: pyinstaller standard_checker.spec --noconfirm\n    - name: Package\n      run: Compress-Archive -Path dist/standard_checker/* -DestinationPath LDAssistant.zip\n    - name: Upload\n      uses: actions/upload-artifact@v4\n      with: {name: LDAssistant, path: LDAssistant.zip}