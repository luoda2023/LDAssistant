name: 构建安装包

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --registry=https://registry.npmmirror.com

      - name: 复制 file-viewer 资源到 public
        run: |
          mkdir -p public/file-viewer
          xcopy /E /I /Y node_modules\@file-viewer\web-full\dist\* public\file-viewer\

      - name: 构建安装包
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 安装包
          path: dist/*.exe
