name: Build LDAssistant EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        architecture: "x64"
    - name: Install deps
      run: pip install pyinstaller PyQt5 Pillow rapidocr-onnxtruntime
    - name: Decompress database
      shell: bash
      run: gunzip -f standards.db.gz
    - name: Encrypt database
      run: python encrypt_db.py
    - name: Build EXE
      run: pyinstaller standard_checker.spec --nonconfirm
    - name: Package
      run: Compress-Archive -Path dist/standard_checker/* -DestinationPath LDAssistant.zip
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LDAssistant
        path: LDAssistant.zip
